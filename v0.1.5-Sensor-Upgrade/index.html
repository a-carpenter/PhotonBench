<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotonBench - A Camera Simulation Tool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-titlebar">
    <h1>PhotonBench</h1>
    <span class="app-subtitle">A Camera Simulation Tool</span>
  </header>
  <div class="app-grid">

    <!-- Left column: Box 6, parameters. Scrolls independently if it doesn't
         all fit vertically. -->
    <section class="panel params-column" id="panel-6">
      <div class="panel-body panel-body-controls">
        <div class="controls-group">
          <h3>Experimental Parameters</h3>
          <div id="experimental-controls" class="controls-list"></div>
        </div>
        <div class="controls-group">
          <h3>Camera Parameters</h3>
          <div id="camera-controls" class="controls-list"></div>
        </div>
        <div class="reset-wrapper">
          <button id="reset-defaults-btn" class="btn btn-reset">Reset to Default</button>
        </div>
      </div>
    </section>

    <!-- Middle column: Box 1 (sensor sim) on top, info text filling the
         remaining space below it. Neither part scrolls. -->
    <div class="center-column">
      <section class="panel" id="panel-1">
        <div class="panel-header">
          <h2>Camera Simulator</h2>
          <div class="panel-controls">
            <div class="sensor-dims">
              <label for="sensor-width-input">W</label>
              <input type="number" id="sensor-width-input" class="dim-input" min="1024" max="5000" step="1" value="1024" />
              <span class="dims-x">&times;</span>
              <label for="sensor-height-input">H</label>
              <input type="number" id="sensor-height-input" class="dim-input" min="100" max="5000" step="1" value="1024" />
            </div>
            <button id="export-btn" class="btn">Export All</button>
            <button id="play-pause-btn" class="btn btn-primary">Play</button>
          </div>
        </div>
        <div class="panel-body panel-body-canvas">
          <canvas id="sensor-canvas"></canvas>
        </div>
      </section>

      <section class="panel info-panel">
        <div class="panel-body">
          <div id="info-text" class="info-text"></div>
        </div>
      </section>
    </div>

    <!-- Right column: Boxes 2-5, stacked and independently scrollable so
         none of them need to shrink to fit. -->
    <div class="plots-column">
      <section class="panel" id="panel-2">
        <div class="panel-header panel-header-plot">
          <div class="panel-controls">
            <button id="export-histogram-btn" class="btn btn-sm">Export</button>
          </div>
        </div>
        <div class="panel-body">
          <div id="histogram-chart" class="chart"></div>
        </div>
      </section>

      <section class="panel" id="panel-3">
        <div class="panel-header panel-header-plot">
          <div class="panel-controls">
            <button id="export-line-btn" class="btn btn-sm">Export</button>
          </div>
        </div>
        <div class="panel-body">
          <div id="line-profile-chart" class="chart"></div>
        </div>
      </section>

      <section class="panel" id="panel-4">
        <div class="panel-header panel-header-plot">
          <div class="panel-controls">
            <button id="export-snr-btn" class="btn btn-sm">Export</button>
          </div>
        </div>
        <div class="panel-body">
          <div id="snr-chart" class="chart"></div>
        </div>
      </section>

      <section class="panel" id="panel-5">
        <div class="panel-header panel-header-plot">
          <div class="panel-controls">
            <button id="export-noise-btn" class="btn btn-sm">Export</button>
          </div>
        </div>
        <div class="panel-body">
          <div id="noise-chart" class="chart"></div>
        </div>
      </section>
    </div>

  </div>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="src/physics.js"></script>
  <script src="src/colormap.js"></script>
  <script src="src/canvas.js"></script>
  <script src="src/charts.js"></script>
  <script src="src/controls.js"></script>
  <script src="src/info.js"></script>
  <script src="src/exporters.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
